name: Generate and upload Blogger drafts

on:
  workflow_dispatch:
  schedule:
    - cron: "15 6 * * *"

jobs:
  generate-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore Blogger auth files
        env:
          CLIENT_SECRET_JSON_B64: ${{ secrets.CLIENT_SECRET_JSON_B64 }}
          TOKEN_BLOGGER_PICKLE_B64: ${{ secrets.TOKEN_BLOGGER_PICKLE_B64 }}
        run: |
          echo "$CLIENT_SECRET_JSON_B64" | base64 -d > client_secret.json
          echo "$TOKEN_BLOGGER_PICKLE_B64" | base64 -d > token_blogger.pickle

      - name: Generate trend articles
        run: |
          python auto_trend_article_writer.py

      - name: Upload drafts to Blogger
        env:
          BLOG_ID: ${{ secrets.BLOG_ID }}
        run: |
          python upload_to_blogger_drafts.py

      - name: Upload generated output as artifact
        uses: actions/upload-artifact@v4
        with:
          name: smart-life-output
          path: output/